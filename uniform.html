<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uniform linear motion — Step 1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      background: #0a0d14;
      color: #e8ecf4;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    header {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid #1e2838;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .step-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      padding: 0.45rem 1rem;
      background: #0a0e18;
      border-bottom: 1px solid #1a2233;
      flex-shrink: 0;
      font-size: 0.9rem;
    }
    .step-links a {
      color: #7ec8ff;
      text-decoration: none;
      padding: 0.2rem 0.35rem;
    }
    .step-links a:hover { text-decoration: underline; }
    .step-links .sep { color: #4a5668; user-select: none; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 0.75rem 1.25rem;
      padding: 0.75rem 1.25rem;
      background: #0c1018;
      border-bottom: 1px solid #1a2233;
      flex-shrink: 0;
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #a8b4c8;
    }
    .toolbar input[type="range"] {
      width: min(72vw, 320px);
      accent-color: #4dd4ff;
    }
    .toolbar output {
      font-variant-numeric: tabular-nums;
      min-width: 10rem;
      color: #7ec8ff;
    }
    .toolbar output.is-hidden { display: none; }
    .panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .panel.active { display: flex; }
    #wrap {
      flex: 1;
      min-height: 0;
      padding: 1rem;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    #wrap3d {
      flex: 1;
      min-height: 0;
      padding: 1rem;
      position: relative;
    }
    #wrap3d canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      touch-action: none;
    }
    #c {
      width: 100%;
      max-width: min(960px, 100%);
      height: min(70vh, 560px);
      background: #080b12;
      border: 1px solid #1e2838;
      border-radius: 8px;
      touch-action: none;
    }
    footer {
      padding: 0.65rem 1.25rem;
      border-top: 1px solid #1e2838;
      font-size: 0.8rem;
      color: #6b7588;
      flex-shrink: 0;
    }
    footer a { color: #7ec8ff; }
  </style>
</head>
<body>
  <header>
    <h1 id="pageTitle">Uniform linear motion (graph is always y = x)</h1>
  </header>
  <nav class="step-links" aria-label="Steps">
    <a href="#step-1" id="linkStep1">Step 1</a>
    <span class="sep">|</span>
    <a href="#step-2" id="linkStep2">Step 2</a>
  </nav>
  <div class="toolbar">
    <label>
      x
      <input type="range" id="xv" min="0" max="1000" value="400" step="1">
      <output id="xvOut" for="xv"></output>
      <output id="rgbOut" for="xv" class="is-hidden"></output>
    </label>
  </div>

  <section id="panel1" class="panel active" aria-label="Step 1">
    <div id="wrap">
      <canvas id="c" width="800" height="480" aria-label="y equals x graph"></canvas>
    </div>
  </section>

  <section id="panel2" class="panel" aria-label="Step 2">
    <div id="wrap3d"></div>
  </section>

  <footer>
    <a href="index.html">← Top</a>
    · <a href="#step-1">Step 1 URL</a> · <a href="#step-2">Step 2 URL</a>
    · Same slider: Step 1 moves the point on y = x; Step 2 maps the value to sphere RGB.
  </footer>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const R = 10;
    const pad = { l: 56, r: 24, t: 28, b: 48 };

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const elX = document.getElementById('xv');
    const elXOut = document.getElementById('xvOut');
    const elRgbOut = document.getElementById('rgbOut');
    const pageTitle = document.getElementById('pageTitle');
    const panel1 = document.getElementById('panel1');
    const panel2 = document.getElementById('panel2');
    const wrap3d = document.getElementById('wrap3d');

    function layout(w, h) {
      const plotW = w - pad.l - pad.r;
      const plotH = h - pad.t - pad.b;
      const square = Math.min(plotW, plotH);
      const left = pad.l + (plotW - square) / 2;
      const top = pad.t + (plotH - square) / 2;
      return { square, left, top };
    }

    function toScreen(px, py, w, h) {
      const { square, left, top } = layout(w, h);
      return {
        sx: left + (px / R) * square,
        sy: top + (1 - py / R) * square
      };
    }

    function drawGraph() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const xVal = (parseFloat(elX.value) / 1000) * R;

      ctx.fillStyle = '#121826';
      ctx.fillRect(0, 0, w, h);

      const { square, left, top } = layout(w, h);

      ctx.strokeStyle = '#2a3548';
      ctx.lineWidth = 1;
      const steps = 10;
      for (let i = 0; i <= steps; i++) {
        const v = (i / steps) * R;
        const a = toScreen(v, 0, w, h);
        const b = toScreen(v, R, w, h);
        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.stroke();
        const c = toScreen(0, v, w, h);
        const d = toScreen(R, v, w, h);
        ctx.beginPath();
        ctx.moveTo(c.sx, c.sy);
        ctx.lineTo(d.sx, d.sy);
        ctx.stroke();
      }

      ctx.strokeStyle = '#8b95a8';
      ctx.lineWidth = 2;
      const o0 = toScreen(0, 0, w, h);
      const ox = toScreen(R, 0, w, h);
      const oy = toScreen(0, R, w, h);
      ctx.beginPath();
      ctx.moveTo(o0.sx, o0.sy);
      ctx.lineTo(ox.sx, ox.sy);
      ctx.moveTo(o0.sx, o0.sy);
      ctx.lineTo(oy.sx, oy.sy);
      ctx.stroke();

      ctx.fillStyle = '#a8b4c8';
      ctx.font = '13px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('x', left + square + 14, o0.sy + 4);
      ctx.textAlign = 'right';
      ctx.fillText('y', o0.sx - 10, top - 6);

      const p0 = toScreen(0, 0, w, h);
      const p1 = toScreen(R, R, w, h);
      ctx.strokeStyle = '#4dd4ff';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(p0.sx, p0.sy);
      ctx.lineTo(p1.sx, p1.sy);
      ctx.stroke();

      const q = toScreen(xVal, xVal, w, h);
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath();
      ctx.arc(q.sx, q.sy, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#664400';
      ctx.lineWidth = 2;
      ctx.stroke();

      elXOut.textContent = `x = ${xVal.toFixed(2)} · y = ${xVal.toFixed(2)}`;
    }

    let threeReady = false;
    let scene;
    let camera;
    let renderer;
    let sphereMesh;
    let controls;

    function sliderT() {
      return (parseFloat(elX.value) / 1000);
    }

    function syncRgbFromSlider() {
      const t = sliderT();
      if (!threeReady) return;
      sphereMesh.material.color.setRGB(t, t, t);
      elRgbOut.textContent =
        `R ${t.toFixed(3)} · G ${t.toFixed(3)} · B ${t.toFixed(3)}`;
    }

    function initThree() {
      if (threeReady) return;
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x05070c);

      camera = new THREE.PerspectiveCamera(42, 2, 0.1, 100);
      camera.position.set(0, 0.35, 3.6);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      wrap3d.appendChild(renderer.domElement);

      const geo = new THREE.SphereGeometry(1, 48, 32);
      const mat = new THREE.MeshStandardMaterial({
        metalness: 0.25,
        roughness: 0.42
      });
      sphereMesh = new THREE.Mesh(geo, mat);
      scene.add(sphereMesh);

      scene.add(new THREE.AmbientLight(0xffffff, 0.38));
      const dl = new THREE.DirectionalLight(0xffffff, 1);
      dl.position.set(4.5, 7.5, 6);
      scene.add(dl);
      scene.add(new THREE.HemisphereLight(0x6688cc, 0x221100, 0.28));

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      threeReady = true;
      syncRgbFromSlider();
      resizeThree();
    }

    function resizeThree() {
      if (!threeReady) return;
      const w = wrap3d.clientWidth;
      const h = Math.max(wrap3d.clientHeight, 200);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    let currentStep = 1;

    function parseStep() {
      const raw = (location.hash || '#step-1').replace(/^#/, '').toLowerCase();
      if (raw === '2' || raw === 'step2' || raw === 'step-2') return 2;
      return 1;
    }

    function applyRoute() {
      if (!location.hash) {
        history.replaceState(null, '', '#step-1');
      }

      currentStep = parseStep();
      panel1.classList.toggle('active', currentStep === 1);
      panel2.classList.toggle('active', currentStep === 2);

      elXOut.classList.toggle('is-hidden', currentStep !== 1);
      elRgbOut.classList.toggle('is-hidden', currentStep !== 2);

      if (currentStep === 1) {
        document.title = 'Uniform linear motion — Step 1';
        pageTitle.textContent = 'Uniform linear motion (graph is always y = x)';
        drawGraph();
      } else {
        document.title = 'Uniform linear motion — Step 2';
        pageTitle.textContent = 'Step 2 — Sphere color (RGB synced to slider, Three.js)';
        initThree();
        syncRgbFromSlider();
        requestAnimationFrame(() => {
          resizeThree();
          requestAnimationFrame(() => resizeThree());
        });
      }
    }

    function resizeGraphShell() {
      const wrap = document.getElementById('wrap');
      const r = wrap.getBoundingClientRect();
      const dpr = Math.min(devicePixelRatio, 2);
      const cw = Math.floor(Math.min(r.width - 8, 960));
      const ch = Math.floor(Math.min(window.innerHeight * 0.65, 560));
      canvas.width = Math.max(400, cw) * dpr;
      canvas.height = Math.max(280, ch) * dpr;
      canvas.style.width = `${Math.max(400, cw)}px`;
      canvas.style.height = `${Math.max(280, ch)}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawGraph();
    }

    window.addEventListener('resize', () => {
      resizeGraphShell();
      resizeThree();
    });

    window.addEventListener('hashchange', applyRoute);

    elX.addEventListener('input', () => {
      if (currentStep === 1) drawGraph();
      else syncRgbFromSlider();
    });

    function loop() {
      requestAnimationFrame(loop);
      if (currentStep === 2 && threeReady) {
        controls.update();
        renderer.render(scene, camera);
      }
    }

    applyRoute();
    resizeGraphShell();
    loop();
  </script>
</body>
</html>
